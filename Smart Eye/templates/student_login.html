{% extends "base.html" %}

{% block title %}Student Login | Teacher Eye{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="card shadow-sm auth-card">
      <div class="card-body">
        <h3 class="card-title mb-3 text-center">Student Login</h3>
        <p class="text-muted text-center mb-4">
          Log in to start an engagement monitoring session.
        </p>
        <form method="POST" action="{{ url_for('student_login') }}">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              class="form-control"
              id="username"
              name="username"
              required
            />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              id="password"
              name="password"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        <p class="mt-3 text-center mb-0">
          Need an account?
          <a href="{{ url_for('register') }}">Register here</a>.
        </p>
      </div>
</div>
{% endblock %}
