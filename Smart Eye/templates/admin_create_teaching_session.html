{% extends "base.html" %}

{% block title %}Create Session | Teacher Eye{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0 fw-bold text-white">Create New Teaching Session</h4>
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label for="meet_title" class="form-label fw-bold">Session Title</label>
            <input type="text" class="form-control" id="meet_title" name="meet_title" placeholder="e.g. Gen AI Workshop" required>
          </div>

          <div class="mb-3">
            <label for="meet_app" class="form-label fw-bold">Meeting App</label>
            <select class="form-select" id="meet_app" name="meet_app" required>
              <option value="" selected disabled>Select App</option>
              <option value="Zoom">Zoom</option>
              <option value="Teams">Microsoft Teams</option>
              <option value="Meet">Google Meet</option>
              <option value="Webex">Webex</option>
              <option value="Others">Others</option>
            </select>
          </div>

          <div class="mb-3" id="custom_app_div" style="display: none;">
            <label for="custom_meet_app" class="form-label fw-bold">Specify App Name</label>
            <input type="text" class="form-control" id="custom_meet_app" name="custom_meet_app" placeholder="e.g. Skype">
          </div>

          <div class="mb-3">
            <label for="date" class="form-label fw-bold">Date</label>
            <input type="date" class="form-control" id="date" name="date" required>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="start_time" class="form-label fw-bold">Start Time</label>
              <input type="time" class="form-control" id="start_time" name="start_time" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="end_time" class="form-label fw-bold">End Time</label>
              <input type="time" class="form-control" id="end_time" name="end_time" required>
            </div>
          </div>

          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary fw-bold">Create Session</button>
            <a href="{{ url_for('admin_teaching_sessions') }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const meetAppSelect = document.getElementById('meet_app');
    const customAppDiv = document.getElementById('custom_app_div');
    const customAppInput = document.getElementById('custom_meet_app');

    meetAppSelect.addEventListener('change', function() {
      if (this.value === 'Others') {
        customAppDiv.style.display = 'block';
        customAppInput.required = true;
      } else {
        customAppDiv.style.display = 'none';
        customAppInput.required = false;
        customAppInput.value = '';
      }
    });
  });
</script>
{% endblock %}
